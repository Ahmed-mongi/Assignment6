name: Gatekeeper ML Pipeline

on:
  push:
    branches: ["**"]

jobs:
  linter:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install flake8

      - run: flake8 . --max-line-length=120 --exclude=venv,.git

  train:
    name: Model Training (Protected)
    runs-on: ubuntu-latest
    needs: linter

    # ✅ ALL 3 CONDITIONS REQUIRED BY ASSIGNMENT
    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run training
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python train.py

      # ❌ FAILURE HANDLING (REQUIRED) - ARTIFACT 1
      - name: Collect error logs
        if: failure()
        run: |
          echo "=== ARTIFACT 1: Training Failure Report ===" > error_logs.txt
          echo "=========================================" >> error_logs.txt
          echo "" >> error_logs.txt
          echo "Status: ❌ FAILED" >> error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt
          echo "Message: ${{ github.event.head_commit.message }}" >> error_logs.txt
          echo "Triggered by: ${{ github.actor }}" >> error_logs.txt
          echo "Run ID: ${{ github.run_id }}" >> error_logs.txt
          echo "Timestamp: $(date)" >> error_logs.txt
          echo "" >> error_logs.txt
          echo "=== Training Step Error ===" >> error_logs.txt
          echo "The model training process failed during execution." >> error_logs.txt
          echo "See GitHub Actions logs for detailed traceback." >> error_logs.txt
          if [ -f train_output.log ]; then
            echo "" >> error_logs.txt
            echo "=== Last 50 Lines of Output ===" >> error_logs.txt
            tail -50 train_output.log >> error_logs.txt
          fi

      - name: Upload error logs (Artifact 1)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt
          retention-days: 14

      # ✅ ALWAYS RUN CLEANUP
      - name: Cleanup temporary cloud volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."